<div class="container-fluid">

    <h2 class="fw-bold mb-4">
        Dashboard
    </h2>

    <div class="row g-4">

        <div class="col-lg-3 col-md-6">

            <div class="card shadow border-0 bg-primary text-white">

                <div class="card-body">

                    <div class="d-flex justify-content-between align-items-center">

                        <div>

                            <h5>Categorías</h5>

                            <h2 class="fw-bold">{{ totalCategorias }}</h2>

                        </div>

                        <i class="bi bi-tags-fill display-3"></i>

                    </div>

                </div>

            </div>

        </div>

        <div class="col-lg-3 col-md-6">

            <div class="card shadow border-0 bg-success text-white">

                <div class="card-body">

                    <div class="d-flex justify-content-between align-items-center">

                        <div>

                            <h5>Clientes</h5>

                            <h2 class="fw-bold">{{ totalClientes }}</h2>

                        </div>

                        <i class="bi bi-people-fill display-3"></i>

                    </div>

                </div>

            </div>

        </div>

        <div class="col-lg-3 col-md-6">

            <div class="card shadow border-0 bg-warning text-dark">

                <div class="card-body">

                    <div class="d-flex justify-content-between align-items-center">

                        <div>

                            <h5>Productos</h5>

                            <h2 class="fw-bold">{{ totalProductos }}</h2>

                        </div>

                        <i class="bi bi-box-seam display-3"></i>

                    </div>

                </div>

            </div>

        </div>

        <div class="col-lg-3 col-md-6">

            <div class="card shadow border-0 bg-danger text-white">

                <div class="card-body">

                    <div class="d-flex justify-content-between align-items-center">

                        <div>

                            <h5>Ventas</h5>

                            <h2 class="fw-bold">{{ totalVentas }}</h2>

                        </div>

                        <i class="bi bi-cash-stack display-3"></i>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <div class="card shadow mt-5">

        <div class="card-body text-center p-5">

            <i class="bi bi-bar-chart-fill display-1 text-primary"></i>

            <h3 class="mt-3">
                Bienvenido al Sistema de Gestión Empresarial
            </h3>

            <p class="text-muted">
                Desde el menú lateral puedes administrar Categorías, Clientes, Productos y Ventas.
            </p>

        </div>

    </div>

</div>
