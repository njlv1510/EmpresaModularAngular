<div class="container-fluid">

    <div class="card shadow">

        <div class="card-header bg-info text-white d-flex justify-content-between align-items-center">

            <h3 class="mb-0">
                <i class="bi bi-box-seam me-2"></i>
                Productos
            </h3>

            <button
                class="btn btn-light"
                (click)="mostrarFormulario = !mostrarFormulario">

                <i class="bi bi-plus-circle me-2"></i>

                Nuevo Producto

            </button>

        </div>

        <div class="card-body" *ngIf="mostrarFormulario">

            <h5 class="mb-4">

                <i class="bi bi-pencil-square me-2"></i>

                {{ modoEdicion ? 'Editar Producto' : 'Nuevo Producto' }}

            </h5>

            <div class="mb-3">

                <label class="form-label fw-bold">Nombre</label>

                <input
                    type="text"
                    class="form-control"
                    [(ngModel)]="nuevoProducto.nombre">

            </div>

            <div class="mb-3">

                <label class="form-label fw-bold">Código</label>

                <input
                    type="text"
                    class="form-control"
                    [(ngModel)]="nuevoProducto.codigo">

            </div>

            <div class="mb-3">

                <label class="form-label fw-bold">Precio</label>

                <input
                    type="number"
                    class="form-control"
                    [(ngModel)]="nuevoProducto.precio">

            </div>

            <div class="mb-3">

                <label class="form-label fw-bold">Stock</label>

                <input
                    type="number"
                    class="form-control"
                    [(ngModel)]="nuevoProducto.stock">

            </div>

            <div class="mb-3">

                <label class="form-label fw-bold">Categoría</label>

                <select
                    class="form-select"
                    [(ngModel)]="nuevoProducto.categoriaId">

                    <option [ngValue]="0">
                        Seleccione una categoría
                    </option>

                    <option
                        *ngFor="let categoria of categorias"
                        [ngValue]="categoria.id">

                        {{ categoria.nombre }}

                    </option>

                </select>

            </div>

            <button
                class="btn btn-success me-2"
                (click)="guardarProducto()">

                <i class="bi bi-check-circle me-2"></i>

                {{ modoEdicion ? 'Actualizar' : 'Guardar' }}

            </button>

            <button
                class="btn btn-secondary"
                (click)="cancelar()">

                <i class="bi bi-x-circle me-2"></i>

                Cancelar

            </button>

        </div>

        <div class="card-body">

            <table class="table table-striped table-hover align-middle">

                <thead class="table-dark text-center">

                    <tr>

                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Código</th>
                        <th>Precio</th>
                        <th>Stock</th>
                        <th>Categoría</th>
                        <th width="180">Acciones</th>

                    </tr>

                </thead>

                <tbody>

                    <tr *ngFor="let producto of productos">

                        <td>{{ producto.id }}</td>

                        <td>{{ producto.nombre }}</td>

                        <td>{{ producto.codigo }}</td>

                        <td>{{ producto.precio | currency:'USD' }}</td>

                        <td>{{ producto.stock }}</td>

                        <td>{{ producto.categoria?.nombre }}</td>

                        <td class="text-center">

                            <button
                                class="btn btn-warning btn-sm me-2"
                                (click)="editarProducto(producto)"
                                title="Editar">

                                <i class="bi bi-pencil-square"></i>

                            </button>

                            <button
                                class="btn btn-danger btn-sm"
                                (click)="eliminarProducto(producto.id)"
                                title="Eliminar">

                                <i class="bi bi-trash-fill"></i>

                            </button>

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>
