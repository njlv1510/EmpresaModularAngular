<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">

            <h3>Ventas</h3>

            <button
                class="btn btn-light"
                (click)="mostrarFormulario = !mostrarFormulario">

                Nueva Venta

            </button>

        </div>

        <div class="card-body" *ngIf="mostrarFormulario">

            <h5>

                {{ modoEdicion ? 'Editar Venta' : 'Nueva Venta' }}

            </h5>

            <div class="mb-3">

                <label>Cliente</label>

                <select
                    class="form-select"
                    [(ngModel)]="nuevaVenta.clienteId">

                    <option [ngValue]="0">
                        Seleccione un cliente
                    </option>

                    <option
                        *ngFor="let cliente of clientes"
                        [ngValue]="cliente.id">

                        {{ cliente.nombre }}

                    </option>

                </select>

            </div>

            <div class="mb-3">

                <label>Producto</label>

                <select
                    class="form-select"
                    [(ngModel)]="nuevaVenta.productoId"
                    (change)="calcularTotal()">

                    <option [ngValue]="0">
                        Seleccione un producto
                    </option>

                    <option
                        *ngFor="let producto of productos"
                        [ngValue]="producto.id">

                        {{ producto.nombre }}

                    </option>

                </select>

            </div>

            <div class="mb-3">

                <label>Cantidad</label>

                <input
                    type="number"
                    class="form-control"
                    [(ngModel)]="nuevaVenta.cantidad"
                    (input)="calcularTotal()">

            </div>

            <div class="mb-3">

                <label>Total</label>

                <input
                    class="form-control"
                    [value]="nuevaVenta.total"
                    readonly>

            </div>

            <button
                class="btn btn-success me-2"
                (click)="guardarVenta()">

                {{ modoEdicion ? 'Actualizar' : 'Guardar' }}

            </button>

            <button
                class="btn btn-secondary"
                (click)="cancelar()">

                Cancelar

            </button>

        </div>

        <div class="card-body">

            <table class="table table-striped table-hover">

                <thead class="table-dark">

                    <tr>

                        <th>ID</th>
                        <th>Fecha</th>
                        <th>Cliente</th>
                        <th>Producto</th>
                        <th>Cantidad</th>
                        <th>Total</th>
                        <th>Acciones</th>

                    </tr>

                </thead>

                <tbody>

                    <tr *ngFor="let venta of ventas">

                        <td>{{ venta.id }}</td>

                        <td>{{ venta.fecha | date:'dd/MM/yyyy' }}</td>

                        <td>{{ venta.cliente?.nombre }}</td>

                        <td>{{ venta.producto?.nombre }}</td>

                        <td>{{ venta.cantidad }}</td>

                        <td>{{ venta.total | currency:'USD' }}</td>

                        <td>

                            <button
                                class="btn btn-warning btn-sm me-2"
                                (click)="editarVenta(venta)">

                                Editar

                            </button>

                            <button
                                class="btn btn-danger btn-sm"
                                (click)="eliminarVenta(venta.id)">

                                Eliminar

                            </button>

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>
