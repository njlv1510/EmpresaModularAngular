<div class="container-fluid">

    <div class="card shadow">

        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">

            <h3 class="mb-0">
                <i class="bi bi-cash-stack me-2"></i>
                Ventas
            </h3>

            <button
                class="btn btn-light"
                (click)="mostrarFormulario = !mostrarFormulario">

                <i class="bi bi-plus-circle me-2"></i>

                Nueva Venta

            </button>

        </div>

        <div class="card-body" *ngIf="mostrarFormulario">

            <h5 class="mb-4">

                <i class="bi bi-pencil-square me-2"></i>

                {{ modoEdicion ? 'Editar Venta' : 'Nueva Venta' }}

            </h5>

            <div class="mb-3">

                <label class="form-label fw-bold">

                    Cliente

                </label>

                <select
                    class="form-select"
                    [(ngModel)]="nuevaVenta.clienteId">

                    <option [ngValue]="0">
                        Seleccione un cliente
                    </option>

                    <option
                        *ngFor="let cliente of clientes"
                        [ngValue]="cliente.id">

                        {{ cliente.nombre }}

                    </option>

                </select>

            </div>

            <div class="mb-3">

                <label class="form-label fw-bold">

                    Producto

                </label>

                <select
                    class="form-select"
                    [(ngModel)]="nuevaVenta.productoId"
                    (change)="calcularTotal()">

                    <option [ngValue]="0">
                        Seleccione un producto
                    </option>

                    <option
                        *ngFor="let producto of productos"
                        [ngValue]="producto.id">

                        {{ producto.nombre }}

                    </option>

                </select>

            </div>

            <div class="mb-3">

                <label class="form-label fw-bold">

                    Cantidad

                </label>

                <input
                    type="number"
                    class="form-control"
                    [(ngModel)]="nuevaVenta.cantidad"
                    (input)="calcularTotal()">

            </div>

            <div class="mb-3">

                <label class="form-label fw-bold">

                    Total

                </label>

                <input
                    class="form-control"
                    [value]="nuevaVenta.total"
                    readonly>

            </div>

            <button
                class="btn btn-success me-2"
                (click)="guardarVenta()">

                <i class="bi bi-check-circle me-2"></i>

                {{ modoEdicion ? 'Actualizar' : 'Guardar' }}

            </button>

            <button
                class="btn btn-secondary"
                (click)="cancelar()">

                <i class="bi bi-x-circle me-2"></i>

                Cancelar

            </button>

        </div>

        <div class="card-body">

            <table class="table table-striped table-hover align-middle">

                <thead class="table-dark text-center">

                    <tr>

                        <th>ID</th>
                        <th>Fecha</th>
                        <th>Cliente</th>
                        <th>Producto</th>
                        <th>Cantidad</th>
                        <th>Total</th>
                        <th width="180">Acciones</th>

                    </tr>

                </thead>

                <tbody>

                    <tr *ngFor="let venta of ventas">

                        <td>{{ venta.id }}</td>

                        <td>{{ venta.fecha | date:'dd/MM/yyyy' }}</td>

                        <td>{{ venta.cliente?.nombre }}</td>

                        <td>{{ venta.producto?.nombre }}</td>

                        <td>{{ venta.cantidad }}</td>

                        <td>{{ venta.total | currency:'USD' }}</td>

                        <td class="text-center">

                            <button
                                class="btn btn-warning btn-sm me-2"
                                (click)="editarVenta(venta)"
                                title="Editar">

                                <i class="bi bi-pencil-square"></i>

                            </button>

                            <button
                                class="btn btn-danger btn-sm"
                                (click)="eliminarVenta(venta.id)"
                                title="Eliminar">

                                <i class="bi bi-trash-fill"></i>

                            </button>

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>
